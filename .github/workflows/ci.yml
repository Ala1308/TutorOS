name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Provided to satisfy lib/env.ts's Zod validation; no real services contacted.
  DATABASE_URL: postgresql://test:test@localhost:5432/test
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  NODE_ENV: test
  DEFAULT_TIMEZONE: America/Montreal

jobs:
  lint-test-build:
    name: lint • typecheck • test • build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Prettier check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
