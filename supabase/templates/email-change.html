<!doctype html>
<html>
  <body
    style="
      font-family:
        -apple-system,
        Segoe UI,
        Roboto,
        sans-serif;
      background: #f7f7f8;
      padding: 24px;
    "
  >
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="480"
            cellspacing="0"
            cellpadding="0"
            style="
              background: #ffffff;
              border-radius: 8px;
              padding: 32px;
              box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
            "
          >
            <tr>
              <td>
                <h2 style="margin: 0 0 12px; font-size: 18px">
                  Confirm your new email
                </h2>
                <p style="margin: 0 0 16px; color: #555; line-height: 1.5">
                  Click below to confirm the change of email address on your
                  TutorOS account.
                </p>
                <p style="margin: 0 0 16px">
                  <a
                    href="{{ .SiteURL }}/auth/callback?token_hash={{ .TokenHash }}&type=email_change"
                    style="
                      display: inline-block;
                      background: #111;
                      color: #fff;
                      padding: 10px 16px;
                      border-radius: 6px;
                      text-decoration: none;
                    "
                    >Confirm email change</a
                  >
                </p>
                <p
                  style="
                    margin: 0;
                    color: #888;
                    font-size: 12px;
                    line-height: 1.5;
                  "
                >
                  If you did not request this change, please contact support
                  immediately.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
